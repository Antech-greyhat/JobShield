<div class="p-4">
  <header class="flex items-center justify-between mb-2">
    <h1 class="text-xl font-bold text-primary">Job Analysis</h1>
    <div id="status-badge" class="bg-gray-100 text-gray-700 px-2 py-1 rounded text-xs font-semibold">Scanning...</div>
  </header>
  <p id="current-website" class="text-xs text-primary mb-6 truncate flex items-center gap-1">
    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
    Detecting website...
  </p>

  <div class="card mb-4">
    <div class="flex items-center justify-between mb-2">
      <h2 class="text-sm font-semibold text-text-muted">Current Job Score</h2>
      <span id="score-text" class="text-2xl font-bold text-gray-400">--/100</span>
    </div>
    <div class="w-full bg-gray-200 rounded-full h-2.5 dark:bg-gray-700 mb-4">
      <div id="score-bar" class="bg-gray-400 h-2.5 rounded-full w-[0%] transition-all duration-500"></div>
    </div>
    <p id="score-message" class="text-xs text-text-muted">Analyzing page content...</p>
  </div>

  <h3 class="font-semibold text-sm mb-2 mt-6">Detected Flags</h3>
  <div id="flags-container" class="space-y-3">
    <p class="text-xs text-text-muted text-center py-4">Scanning...</p>
  </div>
  
  <div class="mt-6">
    <button id="rescan-btn" class="btn btn-primary w-full shadow-md shadow-primary/30 flex items-center justify-center gap-2">
      <svg class="animate-spin h-4 w-4 hidden spinner" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
      <span class="btn-text">Rescan Page</span>
    </button>
  </div>
</div>
