<div class="p-4">
  <h1 class="text-xl font-bold text-danger mb-4">Report a Scam</h1>
  <p class="text-sm text-text-muted mb-6">Found a suspicious job? Report it to help protect other job seekers in the community.</p>

  <form class="space-y-4">
    <div>
      <label class="block text-xs font-semibold text-text-muted mb-1">Job Link (URL)</label>
      <input type="url" class="w-full border border-border rounded-lg px-3 py-2 text-sm bg-surface text-text focus:outline-none focus:ring-2 focus:ring-primary" placeholder="https://..." value="https://brightermonday.co.ke/jobs/suspicious">
    </div>

    <div>
      <label class="block text-xs font-semibold text-text-muted mb-1">Company Name</label>
      <input type="text" class="w-full border border-border rounded-lg px-3 py-2 text-sm bg-surface text-text focus:outline-none focus:ring-2 focus:ring-primary" placeholder="Enter company name">
    </div>

    <div>
      <label class="block text-xs font-semibold text-text-muted mb-1">Why is it suspicious?</label>
      <textarea rows="4" class="w-full border border-border rounded-lg px-3 py-2 text-sm bg-surface text-text focus:outline-none focus:ring-2 focus:ring-primary" placeholder="They asked me to send KES 1000 via M-Pesa for a medical exam..."></textarea>
    </div>

    <button type="button" class="btn bg-danger text-white hover:bg-red-600 w-full shadow-md shadow-danger/30">Submit Report</button>
  </form>
</div>
